<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Quiz App</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Study Bunny">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="top-bar">
    <div class="top-row">
      <div class="left-controls">
        <div class="quiz-select-group" id="quizControls">
          <select id="quizSelector"></select>

          <div class="combine-group">
            <input
              type="text"
              id="combineInput"
              placeholder="Combine"
              autocomplete="off"
              spellcheck="false"
            >
            <button id="combineGoBtn" type="button">Go</button>
          </div>
        </div>

        <div class="bottom-controls">
          <div class="nav-buttons">
            <button id="prevBtn">Previous</button>
            <button id="restartBtn">Restart</button>
            <button id="nextBtn">Next</button>
          </div>

          <div id="progressContainer">
            <span id="progressText">0 remaining</span>

            <div class="progress-bar-row">
              <div id="progressBar">
                <div id="progressFill"></div>
              </div>
              <div id="progressSideFeedback"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="utility-controls">
        <button id="settingsBtn" class="icon-btn" type="button" aria-label="Settings" title="Settings">⚙</button>
        <button id="fullscreenBtn" class="icon-btn" type="button" aria-label="Fullscreen" title="Fullscreen">⛶</button>

        <div id="settingsPopup" class="settings-popup hidden">
          <button id="closeSettingsBtn" class="close-settings-btn" type="button" aria-label="Close settings">✕</button>

          <div class="settings-popup-content">
            <label><input type="checkbox" id="shuffleQuestions"> Shuffle Questions</label>
            <label id="shuffleAnswersLabel"><input type="checkbox" id="shuffleAnswers"> Shuffle Answers</label>
            <label><input type="checkbox" id="penaltyMode"> Penalty Mode</label>
            <label><input type="checkbox" id="masteryMode"> Mastery</label>
            <label><input type="checkbox" id="rapidMode"> Rapid</label>
            <label id="hintsModeLabel"><input type="checkbox" id="hintsMode"> Hints</label>
            <div id="flashcardFrontSetting" class="flashcard-setting-group">
              <div class="flashcard-setting-title">Flashcard Front</div>
              <div class="flashcard-setting-buttons">
                <button id="termFrontBtn" type="button" class="flashcard-setting-btn active">Term Front</button>
                <button id="definitionFrontBtn" type="button" class="flashcard-setting-btn">Definition Front</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="quiz-area">
    <div class="question-container">
      <div id="feedback"></div>
      <div id="questionText">Loading...</div>

      <div class="options">
        <div class="option-block">
          <div class="option-row">
            <button class="optionBtn" id="option1"></button>
            <div class="option-feedback" id="optionFeedback1"></div>
          </div>
          <div class="explanation" id="explanation1"></div>
        </div>

        <div class="option-block">
          <div class="option-row">
            <button class="optionBtn" id="option2"></button>
            <div class="option-feedback" id="optionFeedback2"></div>
          </div>
          <div class="explanation" id="explanation2"></div>
        </div>

        <div class="option-block">
          <div class="option-row">
            <button class="optionBtn" id="option3"></button>
            <div class="option-feedback" id="optionFeedback3"></div>
          </div>
          <div class="explanation" id="explanation3"></div>
        </div>

        <div class="option-block">
          <div class="option-row">
            <button class="optionBtn" id="option4"></button>
            <div class="option-feedback" id="optionFeedback4"></div>
          </div>
          <div class="explanation" id="explanation4"></div>
        </div>
      </div>
    </div>

    <div class="image-container">
      <img id="questionImage" src="" alt="" style="display:none;">
    </div>
  </div>

</div>

<div id="hintOverlay" class="hint-overlay hidden" aria-hidden="true">
  <div class="hint-modal">
    <button id="closeHintBtn" class="close-hint-btn" type="button" aria-label="Close hint">✕</button>
    <div class="hint-title">Mastering it.</div>

    <div id="hintBody" class="hint-body text-only">
      <div id="hintTextPanel" class="hint-text-panel">
        <div id="hintContent" class="hint-content"></div>
      </div>

      <div id="hintImagePanel" class="hint-image-panel hidden">
        <img id="hintImage" src="" alt="Hint image">
      </div>
    </div>
  </div>
</div>

<div id="flashcardImageOverlay" class="flashcard-image-overlay hidden" aria-hidden="true">
  <div class="flashcard-image-modal">
    <button
      id="closeFlashcardImageBtn"
      class="close-flashcard-image-btn"
      type="button"
      aria-label="Close zoomed image"
    >
      ✕
    </button>

    <div id="flashcardImageViewport" class="flashcard-image-viewport">
      <img id="flashcardZoomImage" src="" alt="Flashcard image">
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
